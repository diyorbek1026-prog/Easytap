<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Presentation Title</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #4CAF50; color: white; padding: 1em text-align: center; }
        main { padding: 20px; }
        footer { text-align: center; padding: 10px; background: #f1f1f1; }
    </style>
</head>
<body>
    <header>
        <h1>Your Presentation Title</h1>
        <p>Subtitle or tagline can go here</p>
    </header>
    <main>
        <section>
            <h2>Introduction</h2>
            <p>This is where you introduce your topic.</p>
        </section>
        <section>
            <h2>Key Points</h2>
            <ul>
                <li>Key point one</li>
                <li>Key point two</li>
                <li>Key point three</li>
            </ul>
        </section>
        <section>
            <h2>Conclusion</h2>
            <p>Summarize your presentation.</p>
        </section>
    </main>
    <footer>
        <p>Contact information: your.email@example.com</p>
    </footer>
</body>
</html>
