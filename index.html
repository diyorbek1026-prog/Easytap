<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easytap</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: #fff;
        }
        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 1.5rem;
            margin-bottom: 40px;
        }
        .hero button {
            background-color: #fff;
            color: #6a11cb;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background 0.3s, transform 0.3s;
        }
        .hero button:hover {
            background-color: #6a11cb;
            color: #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to Easytap</h1>
        <p>Your modern solution for easy tapping!</p>
        <button>Get Started</button>
    </div>
</body>
</html>
